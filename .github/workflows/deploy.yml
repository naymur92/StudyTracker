name: CI/CD - Test, Build, Deploy to EC2

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: studytracker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Laravel tests + frontend build)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testing_root
          MYSQL_DATABASE: study_tracker_test
          MYSQL_USER: st_user
          MYSQL_PASSWORD: st_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -ptesting_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, mbstring, bcmath, gd, zip, intl, redis
          coverage: none
          tools: composer:v2

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          sed -i 's|^APP_ENV=.*|APP_ENV=testing|' .env
          sed -i 's|^APP_DEBUG=.*|APP_DEBUG=false|' .env
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^DB_PORT=.*|DB_PORT=3306|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=study_tracker_test|' .env
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=st_user|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=st_secret|' .env

      - name: Build frontend assets
        run: npm run build

      - name: Run backend tests
        run: |
          php artisan migrate --force
          php artisan test

      - name: Validate Docker compose file
        run: docker compose config --quiet

  deploy:
    name: CD (Deploy to EC2)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ secrets.EC2_APP_PATH }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repository not found at $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Use sudo for docker only when the SSH user lacks direct socket access.
            if docker info >/dev/null 2>&1; then
              DOCKER="docker"
            elif sudo -n docker info >/dev/null 2>&1; then
              DOCKER="sudo docker"
            else
              echo "Docker access failed for this SSH user."
              echo "Fix on EC2: sudo usermod -aG docker $USER && newgrp docker"
              exit 1
            fi

            # Deploy with the base compose file only. This avoids loading
            # docker-compose.override.yml (dev-only services such as vite).
            COMPOSE="$DOCKER compose -f docker-compose.yml"

            # Wait for health checks when supported to avoid racing artisan commands.
            if $DOCKER compose up --help | grep -q -- "--wait"; then
              $COMPOSE up -d --build --remove-orphans --wait --wait-timeout 180
            else
              $COMPOSE up -d --build --remove-orphans
            fi

            $COMPOSE ps

            $COMPOSE exec -T study_tracker_app php artisan migrate --force
            $COMPOSE exec -T study_tracker_app php artisan config:cache
            $COMPOSE exec -T study_tracker_app php artisan route:cache
            $COMPOSE exec -T study_tracker_app php artisan view:cache

            $DOCKER image prune -f

            echo "Deploy finished: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

# Required GitHub repository secrets:
# EC2_HOST            -> public IP or hostname of EC2
# EC2_USERNAME        -> SSH user (ubuntu/ec2-user)
# EC2_SSH_PRIVATE_KEY -> private key content (PEM)
# EC2_APP_PATH        -> absolute app path on EC2 (example: /var/www/StudyTracker)
# Optional:
# EC2_SSH_PORT        -> defaults to 22
