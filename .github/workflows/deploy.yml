name: CI/CD - Test, Build, Deploy to EC2 (Native)

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: studytracker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Laravel tests + frontend build)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testing_root
          MYSQL_DATABASE: study_tracker_test
          MYSQL_USER: st_user
          MYSQL_PASSWORD: st_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -ptesting_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_mysql, mbstring, bcmath, gd, zip, intl, redis
          coverage: none
          tools: composer:v2

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          sed -i 's|^APP_ENV=.*|APP_ENV=testing|' .env
          sed -i 's|^APP_DEBUG=.*|APP_DEBUG=false|' .env
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^DB_PORT=.*|DB_PORT=3306|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=study_tracker_test|' .env
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=st_user|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=st_secret|' .env

      - name: Build frontend assets
        run: npm run build

      - name: Run backend tests
        run: |
          php artisan migrate --force
          php artisan test

  deploy:
    name: CD (Deploy to EC2 via SSH)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy over SSH (Native EC2)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ secrets.EC2_APP_PATH }}"

            # Check if repository exists on server
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repository not found at $APP_DIR"
              echo "Run initial setup manually first:"
              echo "  sudo bash deploy/ec2-setup.sh"
              echo "  sudo bash deploy/ec2-configure.sh"
              exit 1
            fi

            echo "=========================================="
            echo " Deploying Study Tracker"
            echo " Directory: $APP_DIR"
            echo " Branch: main"
            echo " Commit: ${{ github.sha }}"
            echo "=========================================="

            cd "$APP_DIR"

            # Pull latest code
            echo "[1/2] Pulling latest changes..."
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Run deployment script
            echo "[2/2] Running deployment script..."
            bash deploy/deploy.sh

            echo ""
            echo "=========================================="
            echo " Deployment complete!"
            echo "=========================================="

            # Show system resources
            echo ""
            echo "System Resources:"
            free -h
            echo ""
            echo "Disk Usage:"
            df -h /var/www

            echo "Deploy finished: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

# Required GitHub repository secrets:
# EC2_HOST            -> public IP or hostname of EC2
# EC2_USERNAME        -> SSH user (ubuntu)
# EC2_SSH_PRIVATE_KEY -> private key content (PEM)
# EC2_APP_PATH        -> absolute app path on EC2 (e.g. /var/www/study-tracker)
# Optional:
# EC2_SSH_PORT        -> defaults to 22
