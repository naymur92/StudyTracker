server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    charset utf-8;
    client_max_body_size 50M;

    # Laravel front-controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Let Laravel handle admin system-log routes that contain .log in the URL.
    # Without this, the generic '.log' deny rule below blocks route-based access.
    location ^~ /admin/system-logs/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        fastcgi_pass study_tracker_app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_buffering off;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Static assets – aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Health-check endpoint (used by ALB / ECS)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive Laravel files
    location ~* \.(env|log|ini|htaccess)$ {
        deny all;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}
