# ─────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT OVERRIDE
#
# Docker Compose merges this file automatically with docker-compose.yml
# when you run `docker compose up` on a dev machine.
# DO NOT commit secrets here. This file is safe to commit as-is.
# ─────────────────────────────────────────────────────────────────

services:

  study_tracker_app:
    # Bind-mount the source code so PHP changes are visible instantly
    # without a full image rebuild. Named volumes declared in the base
    # file take precedence for storage/cache/public paths – those stay
    # as Docker volumes.
    volumes:
      - .:/var/www/html          # live source code
      - /var/www/html/vendor     # keep vendor inside container (not on host)
      - public_data:/var/www/html/public
      - storage_data:/var/www/html/storage/app
      - framework_cache:/var/www/html/storage/framework
      - logs_data:/var/www/html/storage/logs
      - bootstrap_cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      # Disable OPcache revalidation throttle so edited files are
      # picked up by PHP-FPM immediately.
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "1"

  queue:
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - storage_data:/var/www/html/storage/app
      - framework_cache:/var/www/html/storage/framework
      - logs_data:/var/www/html/storage/logs

  vite:
    image: node:20-alpine
    container_name: studytracker_vite
    working_dir: /app
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_DEV_SERVER_HOST: 0.0.0.0
      VITE_HMR_HOST: localhost
      VITE_PORT: 5173
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - public_data:/app/public
    depends_on:
      - study_tracker_app
