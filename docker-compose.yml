# ──────────────────────────────────────────────
# StudyTracker – Docker Compose (local / prod)
# ──────────────────────────────────────────────
# Copy .env.example → .env and fill in values
# before running `docker compose up -d`
# Local DB/Redis are optional via `--profile local-infra`
# Queue/scheduler are optional via `--profile workers`
# ──────────────────────────────────────────────

services:

  # ── PHP-FPM Application ──────────────────────
  study_tracker_app:
    image: ${APP_IMAGE:-ghcr.io/naymur/studytracker}:${APP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: study_tracker_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-study_tracker}
      DB_USERNAME: ${DB_USERNAME:-st_user}
      DB_PASSWORD: ${DB_PASSWORD:-st_secret}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    mem_limit: 300m
    volumes:
      - public_data:/var/www/html/public
      - storage_data:/var/www/html/storage/app
      - framework_cache:/var/www/html/storage/framework
      - logs_data:/var/www/html/storage/logs
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - studytracker

  # ── Nginx Web Server ─────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: studytracker_nginx
    restart: unless-stopped
    mem_limit: 100m
    ports:
      - "${APP_HTTP_PORT:-8080}:80"
      - "${APP_HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public_data:/var/www/html/public:ro
      - storage_data:/var/www/html/storage/app:ro
    networks:
      - studytracker
    depends_on:
      - study_tracker_app

  # ── MySQL 8.0 ────────────────────────────────
  db:
    image: mysql:8.0
    container_name: studytracker_db
    restart: unless-stopped
    profiles: ["local-infra"]
    mem_limit: 350m
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret_root_pass}
      MYSQL_DATABASE: ${DB_DATABASE:-study_tracker}
      MYSQL_USER: ${DB_USERNAME:-st_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-st_secret}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - studytracker
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret_root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis 7 ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: studytracker_redis
    restart: unless-stopped
    profiles: ["local-infra"]
    mem_limit: 100m
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - studytracker
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Queue Worker ─────────────────────────────
  queue:
    image: ${APP_IMAGE:-ghcr.io/naymur/studytracker}:${APP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: studytracker_queue
    restart: unless-stopped
    profiles: ["workers"]
    command: php artisan queue:work --queue=emails,default --sleep=3 --tries=3 --max-time=3600 --memory=256
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-study_tracker}
      DB_USERNAME: ${DB_USERNAME:-st_user}
      DB_PASSWORD: ${DB_PASSWORD:-st_secret}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    mem_limit: 200m
    volumes:
      - storage_data:/var/www/html/storage/app
      - framework_cache:/var/www/html/storage/framework
      - logs_data:/var/www/html/storage/logs
    networks:
      - studytracker

  # ── Scheduler Worker ─────────────────────────
  scheduler:
    image: ${APP_IMAGE:-ghcr.io/naymur/studytracker}:${APP_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: studytracker_scheduler
    restart: unless-stopped
    profiles: ["workers"]
    command: php artisan schedule:work
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-study_tracker}
      DB_USERNAME: ${DB_USERNAME:-st_user}
      DB_PASSWORD: ${DB_PASSWORD:-st_secret}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    mem_limit: 150m
    volumes:
      - storage_data:/var/www/html/storage/app
      - framework_cache:/var/www/html/storage/framework
      - logs_data:/var/www/html/storage/logs
    networks:
      - studytracker

# ── Networks ──────────────────────────────────
networks:
  studytracker:
    driver: bridge

# ── Volumes ───────────────────────────────────
volumes:
  db_data:
  redis_data:
  public_data:
  storage_data:
  framework_cache:
  logs_data:
  bootstrap_cache:
